name: pharmacy_network
description: A pharmacy drug sharing network application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.9.0  

  # Routing
  go_router: ^17.3.0

  # State management
  provider: ^6.1.0

  # API
  http: ^1.2.2
  dio: ^5.5.0
  web_socket_channel: ^3.0.1

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  flutter_map: ^8.3.0      # map widget
  latlong2: ^0.10.1         # LatLng coordinate class
  web: ^1.1.1
  flutter_map_marker_cluster: ^8.2.2
  intl: ^0.20.3
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
dependency_overrides:
  latlong2: ^0.10.1
