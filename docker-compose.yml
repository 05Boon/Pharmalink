services:
  database:
    image: postgis/postgis:15-3.3
    container_name: local_pharmacy_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: local_secret_password
      POSTGRES_DB: pharmacy_network_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pharmacy_network_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharmalink-network

  web:
    build:
      context: ./routing_engine
      dockerfile: Dockerfile
    container_name: routing_engine_web
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    command: >
      sh -c "python create_tables.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    networks:
      - pharmalink-network

volumes:
  pgdata:

networks:
  pharmalink-network:
    driver: bridge